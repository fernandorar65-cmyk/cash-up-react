<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Staff Login | CashUp Internal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#172436",
                        "background-light": "#f6f7f7",
                        "background-dark": "#15181d",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-6 md:px-10 py-3">
<div class="flex items-center gap-3">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined">account_balance_wallet</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight">CashUp Internal</h2>
</div>
<div class="flex items-center gap-4">
<button class="hidden md:flex items-center gap-2 text-slate-600 dark:text-slate-400 text-sm font-medium hover:text-primary dark:hover:text-white transition-colors">
<span class="material-symbols-outlined text-lg">help</span>
                Support
            </button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold transition-opacity hover:opacity-90">
                System Status
            </button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center p-4 md:p-8">
<div class="w-full max-w-[480px] space-y-8">
<!-- Welcome Header -->
<div class="text-center md:text-left space-y-2">
<h1 class="text-slate-900 dark:text-white text-4xl font-black leading-tight tracking-tight">Staff Login</h1>
<p class="text-slate-500 dark:text-slate-400 text-base">Access your secure financial management dashboard</p>
</div>
<!-- Login Card -->
<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm p-6 md:p-8 space-y-6">
<!-- Form Inputs -->
<div class="space-y-4">
<div class="space-y-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal">Corporate Email</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-xl">mail</span>
<input class="w-full h-14 pl-12 pr-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="name@cashup.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal">Password</label>
<a class="text-primary dark:text-slate-300 text-xs font-bold hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-xl">lock</span>
<input class="w-full h-14 pl-12 pr-12 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<label class="flex items-center gap-3 cursor-pointer group">
<input class="h-5 w-5 rounded border-slate-300 dark:border-slate-700 bg-transparent text-primary focus:ring-0 focus:ring-offset-0 transition-colors" type="checkbox"/>
<span class="text-slate-600 dark:text-slate-400 text-sm font-medium group-hover:text-slate-900 dark:group-hover:text-slate-200 transition-colors">Remember this device</span>
</label>
</div>
<!-- Sign In Button -->
<button class="w-full h-14 bg-primary hover:bg-opacity-90 text-white rounded-lg font-bold text-base transition-all shadow-md active:scale-[0.98]">
                    Sign In
                </button>
</div>
<!-- Footer Links -->
<footer class="text-center space-y-4">
<p class="text-slate-500 dark:text-slate-400 text-xs leading-relaxed">
                    By signing in, you agree to our <a class="underline font-medium text-slate-700 dark:text-slate-300" href="#">Internal Security Protocol</a> and <a class="underline font-medium text-slate-700 dark:text-slate-300" href="#">Data Access Policy</a>.
                </p>
<div class="flex justify-center gap-6">
<a class="text-slate-400 dark:text-slate-600 hover:text-primary dark:hover:text-slate-400 text-xs font-semibold uppercase tracking-widest" href="#">Privacy</a>
<a class="text-slate-400 dark:text-slate-600 hover:text-primary dark:hover:text-slate-400 text-xs font-semibold uppercase tracking-widest" href="#">Compliance</a>
<a class="text-slate-400 dark:text-slate-600 hover:text-primary dark:hover:text-slate-400 text-xs font-semibold uppercase tracking-widest" href="#">Contact IT</a>
</div>
</footer>
</div>
</main>
<!-- Decorative background element -->
<div class="fixed bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-primary via-slate-400 to-primary opacity-20"></div>
</body></html>
